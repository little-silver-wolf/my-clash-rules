proxies:
  - name: "🚗 直连"
    type: direct
    udp: true

mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
external-controller: 127.0.0.1:9090
unified-delay: false
tcp-concurrent: true

dns:
  enable: true
  ipv6: true
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-filter: 
    - "*.market.xiaomi.com"
    - "*.n.n.srv.nintendo.net"
    - "+.stun.playstation.net"
    - xbox.*.*.microsoft.com
    - "*.msftncsi.com"
    - "*.msftconnecttest.com"
    - WORKGROUP
    - "*.lan"
    - stun.*.*.*
    - stun.*.*
    - time.windows.com
    - time.nist.gov
    - time.apple.com
    - time.asia.apple.com
    - "*.ntp.org.cn"
    - "*.openwrt.pool.ntp.org"
    - time1.cloud.tencent.com
    - time.ustc.edu.cn
    - pool.ntp.org
    - ntp.ubuntu.com
    - "*.*.xboxlive.com"
    - speedtest.cros.wr.pvp.net
    - stun.services.mozilla1.com
    - ntp.nasa.gov
    - captive.apple.com
  nameserver:
    - https://120.53.53.53/dns-query
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://120.53.53.53/dns-query
    - https://223.5.5.5/dns-query
  nameserver-policy:
    "geosite:cn,apple":
      - https://120.53.53.53/dns-query
      - https://223.5.5.5/dns-query
      - system
    "geosite:geolocation-!cn":
      - https://dns.cloudflare.com/dns-query
      - https://dns.google/dns-query
    "geosite:private":
      - system

proxy-groups:
  - name: 🎯 节点选择
    type: select
    proxies:
      [
        🌐 全部节点,
        🇭🇰 香港,
        🏝️ 台湾,
        🇯🇵 日本,
        🇸🇬 新加坡,
        🇺🇸 美国,
        ❓ 其它地区,
        🚗 直连,
      ]

  - name: 🌐 全部节点
    type: select
    include-all: true
    exclude-type: direct
    proxies:
      - 📶 自动选择

  - name: 🔍 Google
    type: select
    proxies:
      [
        🎯 节点选择,
        🚗 直连,
      ]

  - name: 📲 Telegram
    type: select
    proxies:
      [
        🎯 节点选择,
        🚗 直连,
      ]

  - name: 🍎 Apple
    type: select
    proxies:
      [
        🚗 直连,
        🎯 节点选择,
      ]
  - name: 🛜 iCloud
    type: select
    proxies:
      [
        🚗 直连,
        🎯 节点选择,
      ]

  - name: 🚫 屏蔽访问
    type: select
    proxies:
      [
        REJECT,
        🚗 直连,
        🎯 节点选择,
      ]
  - name: 🇨🇳 国内
    type: select
    proxies:
      [
        🚗 直连,
        🎯 节点选择,
      ]
  - name: 🎯 兜底路由
    type: select
    proxies:
      [
        🎯 节点选择,
        🚗 直连
      ]

  #分隔,下面是地区分组

  - name: 📶 自动选择
    type: url-test
    include-all: true
    exclude-type: direct
    tolerance: 10

  - name: 🇭🇰 香港
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)港|hk|hongkong|hong kong"
    proxies:
      - 📶 自动选择

  - name: 🏝️ 台湾
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)台|tw|taiwan"
    proxies:
      - 📶 自动选择

  - name: 🇯🇵 日本
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)^(?!.*(?:尼日利亚|nigeria)).*(?:日|jp|japan)"
    proxies:
      - 📶 自动选择

  - name: 🇺🇸 美国
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)美|us|unitedstates|united states"
    proxies:
      - 📶 自动选择

  - name: 🇸🇬 新加坡
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)(新|sg|singapore)"
    proxies:
      - 📶 自动选择

  - name: ❓ 其它地区
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates)).*"

